name: Build image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: iplist-go-unifi:smoke

      - name: Smoke test image
        run: |
          cat >/tmp/iplist-go-unifi-smoke.yml <<'YAML'
          unifi:
            base_url: "https://unifi.example.test"
            api_key: "smoke-test"
            site: "default"
          schedule:
            run_on_start: false
          safety:
            dry_run: true
          sources:
            - name: "smoke"
              url: "https://iplist.example.test/export"
              type: "ipv4_cidr"
              network_id: "smoke-network"
          YAML

          cleanup() {
            docker rm -f iplist-go-unifi-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d \
            --name iplist-go-unifi-smoke \
            -p 18086:18086 \
            -v /tmp/iplist-go-unifi-smoke.yml:/etc/iplist-go-unifi/config.yml:ro \
            iplist-go-unifi:smoke

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18086/healthz; then
              exit 0
            fi
            sleep 1
          done

          docker logs iplist-go-unifi-smoke
          exit 1

      - name: Publish multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
